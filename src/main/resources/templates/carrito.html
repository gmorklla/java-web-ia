<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Carrito de Compras</title>
    <!-- Bootstrap CSS CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand" href="/">Mi Tienda QTX</a>
        <div class="collapse navbar-collapse">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item">
                    <a class="nav-link active" href="/carrito">Carrito</a>
                </li>
            </ul>
        </div>
    </div>
</nav>

<div class="container mt-5">
    <h2 class="mb-4">
        <i class="bi bi-cart3"></i> Tu Carrito de Compras
    </h2>
    
    <div class="row" th:if="${#lists.isEmpty(items)}">
        <div class="col-12">
            <div class="alert alert-warning text-center">
                Tu carrito está vacío. ¡Empieza a comprar!
            </div>
            <div class="text-center mt-3">
                <a href="/categorias" class="btn btn-primary btn-lg">Ir al Catálogo</a>
            </div>
        </div>
    </div>

    <div class="row" th:unless="${#lists.isEmpty(items)}">
        <div class="col-md-8">
            <div class="card shadow-sm mb-4">
                <div class="card-body">
                    <div class="table-responsive">
                        <table class="table table-hover align-middle">
                            <thead class="table-light">
                                <tr>
                                    <th>Producto</th>
                                    <th>Precio Unitario</th>
                                    <th>Cantidad</th>
                                    <th>Subtotal</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr th:each="item : ${items}">
                                    <td th:text="${item.producto.nombre}">Nombre Producto</td>
                                    <td th:text="${'$' + item.producto.precio}">$0.00</td>
                                    <td th:text="${item.cantidad}">1</td>
                                    <td th:text="${'$' + item.subtotal}" class="fw-bold">$0.00</td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
        
        <div class="col-md-4">
            <div class="card shadow">
                <div class="card-header bg-success text-white">
                    <h4 class="card-title mb-0">Resumen de Compra</h4>
                </div>
                <div class="card-body">
                    <h3 class="d-flex justify-content-between">
                        <span>Total:</span>
                        <span th:text="${'$' + total}">$0.00</span>
                    </h3>
                    
                    <hr class="my-4">
                    
                    <div class="d-grid gap-2">
                        <button class="btn btn-success btn-lg" disabled>
                            Proceder al Pago
                        </button>
                        <a href="/categorias" class="btn btn-outline-primary">
                            Seguir Comprando
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- Bootstrap JS CDN -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
