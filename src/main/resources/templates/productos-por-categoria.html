<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Productos por Categoría</title>
    <!-- Bootstrap CSS CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand" href="/">Mi Tienda QTX</a>
        <div class="collapse navbar-collapse">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item">
                    <a class="nav-link" href="/carrito">Carrito</a>
                </li>
            </ul>
        </div>
    </div>
</nav>

<div class="container mt-5">
    <nav aria-label="breadcrumb">
        <ol class="breadcrumb">
            <li class="breadcrumb-item"><a href="/categorias">Categorías</a></li>
            <li class="breadcrumb-item active" aria-current="page" th:text="${categoria.nombre}">Categoría Actual</li>
        </ol>
    </nav>

    <h2 class="mb-4">Productos en <span th:text="${categoria.nombre}"></span></h2>

    <div class="row">
        <div class="col-md-4 mb-4" th:each="producto : ${productos}">
            <div class="card h-100 shadow-sm">
                <div class="card-body d-flex flex-column">
                    <h5 class="card-title" th:text="${producto.nombre}">Nombre Producto</h5>
                    <p class="card-text text-muted" th:text="${producto.descripcion}">Descripción corta.</p>
                    <h6 class="card-subtitle mb-2 text-primary" th:text="${'$' + producto.precio}">$0.00</h6>
                    <div class="mt-auto">
                        <a th:href="@{/productos/{id}(id=${producto.id})}" class="btn btn-outline-primary w-100">Ver Detalle</a>
                    </div>
                </div>
            </div>
        </div>
        
        <div th:if="${#lists.isEmpty(productos)}" class="col-12">
            <div class="alert alert-info" role="alert">
                No hay productos en esta categoría por el momento.
            </div>
        </div>
    </div>

    <a href="/categorias" class="btn btn-secondary mt-3">Volver al Catálogo</a>
</div>

<!-- Bootstrap JS CDN -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
